<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SalesHunter v2{% endblock %}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:#3f3f46;--border-light:#52525b;
    --text:#fafafa;--text-muted:#a1a1aa;--text-dim:#71717a;
    --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
    --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.12);
    --purple:#a855f7;--purple-bg:rgba(168,85,247,0.12);
    --orange:#f97316;--orange-bg:rgba(249,115,22,0.12);
    --cyan:#06b6d4;--cyan-bg:rgba(6,182,212,0.1);
    --yellow:#eab308;--yellow-bg:rgba(234,179,8,0.1);
    --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
    --pink:#ec4899;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  a{color:var(--blue);text-decoration:none;}
  a:hover{text-decoration:underline;}

  .header{background:rgba(24,24,27,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
  .logo{width:40px;height:40px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(34,197,94,0.2);}
  .h-title{font-size:20px;font-weight:700;}
  .h-title span{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--green-bg);padding:2px 10px;border-radius:6px;margin-left:8px;}

  .nav{display:flex;gap:4px;margin-left:auto;}
  .nav a{color:var(--text-muted);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;transition:all .15s;}
  .nav a:hover,.nav a.active{color:var(--text);background:var(--surface2);}

  .main{max-width:1400px;margin:0 auto;padding:24px 32px;position:relative;z-index:1;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:12px;}
  .card h3{font-size:15px;font-weight:700;margin-bottom:10px;}

  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
  .stat .num{font-size:28px;font-weight:800;}
  .stat .lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace;margin-top:2px;}

  .tag{display:inline-block;font-size:11px;padding:4px 10px;border-radius:6px;font-weight:600;margin:2px;}
  .alert{border-radius:10px;padding:14px 18px;font-size:13px;line-height:1.6;margin-bottom:12px;}
  .alert-green{background:var(--green-bg);border:1px solid rgba(34,197,94,0.25);color:var(--green);}
  .alert-orange{background:var(--orange-bg);border:1px solid rgba(249,115,22,0.25);color:var(--orange);}
  .alert-red{background:var(--red-bg);border:1px solid rgba(239,68,68,0.25);color:var(--red);}
  .alert-blue{background:var(--blue-bg);border:1px solid rgba(59,130,246,0.25);color:var(--blue);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--text-dim);font-weight:500;padding:10px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.4px;font-family:'JetBrains Mono',monospace;}
  td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-muted);}
  tr:hover td{background:var(--surface2);}

  .btn{display:inline-block;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;text-decoration:none;}
  .btn-green{background:var(--green);color:#000;}
  .btn-green:hover{opacity:0.9;text-decoration:none;}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-sm{padding:4px 10px;font-size:11px;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
  .btn-outline:hover{border-color:var(--text);color:var(--text);text-decoration:none;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

  .sec{margin-bottom:36px;}
  .sec-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}

  input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;}
  input:focus,select:focus{outline:none;border-color:var(--blue);}

  .funnel-step{display:flex;align-items:center;gap:12px;padding:8px 0;}
  .funnel-bar{height:32px;border-radius:6px;display:flex;align-items:center;padding:0 12px;font-weight:700;font-size:12px;color:white;min-width:40px;transition:width .3s;}
  .funnel-label{font-size:13px;color:var(--text-muted);flex:1;}
  .funnel-num{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:60px;text-align:right;}
  .funnel-rate{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;min-width:50px;text-align:right;}

  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-red{background:var(--red-bg);color:var(--red);}
  .badge-orange{background:var(--orange-bg);color:var(--orange);}
  .badge-blue{background:var(--blue-bg);color:var(--blue);}

  @media(max-width:768px){.stats-row,.grid-2,.grid-3{grid-template-columns:1fr;}.main{padding:16px;}.nav{display:none;}}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<div class="header">
  <div class="logo">&#128176;</div>
  <div class="h-title">SalesHunter <span>v2.0</span></div>
  <div class="nav">
    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="{% url 'master_master' %}" class="{% if request.resolver_match.url_name == 'master_master' %}active{% endif %}">Forms</a>
    <a href="{% url 'email_outreach' %}" class="{% if request.resolver_match.url_name == 'email_outreach' %}active{% endif %}">Email</a>
    <a href="{% url 'leads_pipeline' %}" class="{% if request.resolver_match.url_name == 'leads_pipeline' %}active{% endif %}">Leads Pipeline</a>
  </div>
</div>

<div class="main">
  {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
