<!-- Reusable progress charts. Expects: chart_id, stats_json -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">
        <h4 style="color:var(--text-muted);font-size:12px;text-transform:uppercase;margin-bottom:12px;">Progress Overview</h4>
        <div style="height:220px;position:relative;">
            <canvas id="{{ chart_id }}-doughnut"></canvas>
        </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">
        <h4 style="color:var(--text-muted);font-size:12px;text-transform:uppercase;margin-bottom:12px;">Status Breakdown</h4>
        <div style="height:220px;position:relative;">
            <canvas id="{{ chart_id }}-bar"></canvas>
        </div>
    </div>
</div>
<script>
(function _tryChart_{{ chart_id }}() {
    if (typeof Chart === 'undefined') { setTimeout(_tryChart_{{ chart_id }}, 200); return; }
    try {
        var s = {{ stats_json|safe }};
        var success = s.success || 0;
        var failed = s.failed || 0;
        var running = s.running || 0;
        var total = s.total || (success + failed + running + (s.pending || 0));
        var notStarted = total - success - failed - running;
        if (notStarted < 0) notStarted = 0;

        var doughnutCtx = document.getElementById('{{ chart_id }}-doughnut');
        if (doughnutCtx) {
            new Chart(doughnutCtx.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failed', 'Running', 'Not Started'],
                    datasets: [{
                        data: [success, failed, running, notStarted],
                        backgroundColor: ['#4ade80', '#f87171', '#fbbf24', '#475569'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 10, font: { size: 11 }, usePointStyle: true } }
                    }
                }
            });
        }

        var barCtx = document.getElementById('{{ chart_id }}-bar');
        if (barCtx) {
            new Chart(barCtx.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['Success', 'Failed', 'Running', 'Not Started'],
                    datasets: [{
                        data: [success, failed, running, notStarted],
                        backgroundColor: ['#4ade80', '#f87171', '#fbbf24', '#475569'],
                        borderRadius: 6,
                        maxBarThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#64748b', stepSize: 1 }, grid: { color: '#334155' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                    }
                }
            });
        }
    } catch(e) { console.error('Chart error:', e); }
})();
</script>
